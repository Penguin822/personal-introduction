<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Courses</title>

<style>
:root{
    --primary:#FFE0C4;
    --primary-dark:#f5cba7;
    --text:#2b2b2b;
}

body{
    margin:0;
    font-family:"Segoe UI", sans-serif;
    background:#fff;
    color:var(--text);
}

/* ===== Navbar ===== */
nav{
    position:sticky;
    top:0;
    background:var(--primary);
    display:flex;
    justify-content:center;
    gap:18px;
    padding:14px;
}
nav a{
    text-decoration:none;
    color:#333;
    padding:8px 12px;
    border-radius:8px;
    transition:.3s;
}
nav a:hover{
    background:var(--primary-dark);
    transform:translateY(-2px);
}

/* ===== Section ===== */
.section{
    padding:60px 20px;
    max-width:1100px;
    margin:auto;
}

/* ===== Title ===== */
.title{
    font-size:28px;
    margin-bottom:30px;
}

/* ===== Category ===== */
.category{
    margin-bottom:40px;
}

.category-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:15px;
    border-left:5px solid var(--primary);
    padding-left:10px;
}

/* ===== Grid ===== */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:15px;
}

/* ===== Card ===== */
.card{
    background:#fff;
    padding:15px;
    border-radius:12px;
    transition:.3s;
    border:1px solid #f2f2f2;
}

.card:hover{
    transform:translateY(-6px);
    background:#fff8f2;
}

/* ===== Grade ===== */
.grade{
    color:#d35400;
    font-weight:bold;
    margin-left:5px;
}

</style>
</head>

<body>

<nav>

</nav>

</body>
</html>
