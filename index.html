<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Home</title>

<style>
:root{
    --primary:#FFE0C4;
    --primary-dark:#f5cba7;
    --text:#2b2b2b;
}

body{
    margin:0;
    font-family:"Segoe UI", sans-serif;
    background:#fff;
    color:var(--text);
}

/* ===== Navbar ===== */
nav{
    position:sticky;
    top:0;
    background:var(--primary);
    display:flex;
    justify-content:center;
    gap:18px;
    padding:14px;
}
nav a{
    text-decoration:none;
    color:#333;
    padding:8px 12px;
    border-radius:8px;
    transition:.3s;
}
nav a:hover{
    background:var(--primary-dark);
    transform:translateY(-2px);
}

/* ===== Hero ===== */
.hero{
    height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(120deg,var(--primary),#fff);
    text-align:center;
    position:relative;
    overflow:hidden;
}

/* ===== 頭像 ===== */
.profile-wrapper{
    padding:10px;
    border-radius:50%;
    background:linear-gradient(120deg,#fff,var(--primary));
    margin-bottom:20px;
    position:relative;
    animation:fadeIn 1s ease forwards;
}

.profile-pic{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
}

/* 虛線動畫 */
.profile-wrapper::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border-radius:50%;
    border:3px dashed #f5cba7;
    opacity:0;
    transform:scale(1.3);
    animation:ring 1.2s ease forwards;
}

@keyframes ring{
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* ===== 氣泡 ===== */
.bubble{
    position:absolute;
    width:140px;
    height:140px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    font-weight:500;
    cursor:pointer;

    opacity:0;
    transform:scale(0.5);

    animation:
        pop 0.8s forwards,
        float 4s ease-in-out infinite;

    transition: transform 0.2s ease, filter 0.3s;
}

/* 入場 */
@keyframes pop{
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* 🌊 呼吸漂浮 */
@keyframes float{
    0%   { transform: translateY(0px) scale(1); }
    50%  { transform: translateY(-10px) scale(1.05); }
    100% { transform: translateY(0px) scale(1); }
}

/* hover */
.bubble:hover{
    transform:scale(1.15);
    filter:brightness(0.9);
}

/* ===== 不同氣泡位置 + 顏色 ===== */
.b1{background:#FFE5D9; top:18%; left:18%; animation-delay:0.3s;}
.b2{background:#FFF1E6; top:20%; right:18%; animation-delay:0.5s;}
.b3{background:#E3F2FD; bottom:28%; left:15%; animation-delay:0.7s;}
.b4{background:#E8F8F5; bottom:25%; right:18%; animation-delay:0.9s;}
.b5{background:#FDEDEC; top:50%; left:6%; animation-delay:1.1s;}
.b6{background:#F9EBEA; top:55%; right:6%; animation-delay:1.3s;}

/* ===== Button ===== */
.btn{
    padding:12px 20px;
    background:var(--primary);
    border:none;
    border-radius:10px;
    cursor:pointer;
}
.btn:hover{
    background:var(--primary-dark);
}

/* ===== fade ===== */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="education.html">Education</a>
<a href="courses.html">Courses</a>
<a href="projects.html">Projects</a>
<a href="research.html">Research</a>
<a href="internship.html">Internship</a>
<a href="others.html">Others</a>
</nav>

<div class="hero">

<!-- 頭像 -->
<div class="profile-wrapper">
    <img src="images/profile.png" class="profile-pic">
</div>

<h1>張綵芸</h1>
<p>AI / Medical Image / Deep Learning</p>

<button class="btn" onclick="location.href='about.html'">
    Enter Portfolio
</button>

<!-- 氣泡 -->
<div class="bubble b1" onclick="location.href='education.html'">Education</div>
<div class="bubble b2" onclick="location.href='courses.html'">Courses</div>
<div class="bubble b3" onclick="location.href='projects.html'">Projects</div>
<div class="bubble b4" onclick="location.href='research.html'">Research</div>
<div class="bubble b5" onclick="location.href='internship.html'">Internship</div>
<div class="bubble b6" onclick="location.href='others.html'">Others</div>

</div>

<!-- 🔥 磁吸效果 -->
<script>
const bubbles = document.querySelectorAll('.bubble');

document.addEventListener('mousemove', (e) => {
    bubbles.forEach(bubble => {
        const rect = bubble.getBoundingClientRect();
        const bx = rect.left + rect.width / 2;
        const by = rect.top + rect.height / 2;

        const dx = e.clientX - bx;
        const dy = e.clientY - by;
        const distance = Math.sqrt(dx*dx + dy*dy);

        if(distance < 150){
            bubble.style.transform = `translate(${dx*0.2}px, ${dy*0.2}px) scale(1.1)`;
        }else{
            bubble.style.transform = "";
        }
    });
});
</script>

</body>
</html>
