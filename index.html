<head>
<meta charset="UTF-8">

<title>Tsai-Yun Chang | Portfolio</title>

<style>
    :root {
        --primary: #FFE0C4;
        --primary-dark: #f5cba7;
        --secondary-pink: #FFD6E0;
        --secondary-blue: #E0F7FA;
        --secondary-green: #E8F5E9;
        --secondary-yellow: #FFF3E0;
        --secondary-purple: #F3E5F5;
        --bg-color: #fafafa;
        --text-main: #2b2b2b;
        --text-muted: #666;
    }

    /* ===== 基本設定 ===== */
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        overflow: hidden; /* 保持首頁無滾動條的沉浸感 */
        -webkit-font-smoothing: antialiased;
    }

    /* ===== 毛玻璃導覽列 ===== */
    nav {
        position: fixed;
        top: 0;
        width: 100%;
        background: rgba(255, 224, 196, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        justify-content: center;
        gap: 24px;
        padding: 16px;
        z-index: 100;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    }
    nav a {
        text-decoration: none;
        color: #4a4a4a;
        font-weight: 500;
        padding: 8px 16px;
        border-radius: 12px;
        transition: all 0.3s ease;
        font-size: 15px;
    }
    nav a:hover, nav a.active {
        background: rgba(255, 255, 255, 0.6);
        color: var(--text-main);
        transform: translateY(-2px);
    }

    /* ===== Hero 區塊 ===== */
    .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        /* 柔和的動態漸層背景 */
        background: radial-gradient(circle at 50% 30%, #fff 0%, #fffaf5 40%, var(--primary) 150%);
        text-align: center;
        position: relative;
    }

    /* ===== 頭像區塊 (呼吸燈與光暈) ===== */
    .profile-wrapper {
        position: relative;
        margin-bottom: 24px;
        z-index: 10;
        opacity: 0;
        transform: scale(0.8);
        animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.2s;
    }

    .profile-pic {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        object-fit: cover;
        border: 6px solid #fff;
        box-shadow: 0 15px 35px rgba(245, 203, 167, 0.4);
        position: relative;
        z-index: 2;
        transition: transform 0.4s ease;
    }

    .profile-wrapper:hover .profile-pic {
        transform: scale(1.05);
    }

    /* 動態旋轉的外圈裝飾 */
    .profile-wrapper::before, .profile-wrapper::after {
        content: "";
        position: absolute;
        top: -10px; left: -10px; right: -10px; bottom: -10px;
        border-radius: 50%;
        border: 2px solid transparent;
        z-index: 1;
        transition: 0.5s;
    }
    .profile-wrapper::before {
        border-top-color: var(--primary-dark);
        border-right-color: var(--secondary-pink);
        animation: spin 8s linear infinite;
    }
    .profile-wrapper::after {
        border-bottom-color: var(--secondary-blue);
        border-left-color: var(--secondary-green);
        animation: spin 12s linear infinite reverse;
    }

    /* ===== 文字資訊 ===== */
    .info-container {
        z-index: 10;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 0.8s ease forwards 0.4s;
    }

    .name {
        font-size: 38px;
        font-weight: 800;
        margin: 0 0 8px 0;
        color: var(--text-main);
        letter-spacing: 2px;
    }

    .school {
        font-size: 18px;
        color: var(--text-muted);
        margin: 0 0 12px 0;
        font-weight: 500;
    }

    /* 凸顯專業領域的 Tag */
    .role-badge {
        display: inline-block;
        background: #fff;
        padding: 8px 20px;
        border-radius: 30px;
        font-size: 14px;
        font-weight: 600;
        color: #d36e30;
        box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        border: 1px solid #fde4d5;
        letter-spacing: 0.5px;
    }

    /* ===== 社群連結 (聯絡方式) ===== */
    .social-links {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 24px;
        opacity: 0;
        transform: translateY(15px);
        animation: fadeInUp 0.8s ease forwards 0.6s;
    }

    .social-btn {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        color: var(--text-main);
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
    }

    .social-btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
    }

    .social-btn:hover {
        background: var(--primary-dark);
        color: #fff;
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        border-color: transparent;
    }

    /* ===== QR Code 區塊 ===== */
    .qr-container {
        position: absolute;
        bottom: 40px;
        right: 40px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 50;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 0.8s ease forwards 0.8s;
        transition: transform 0.3s ease;
    }

    .qr-container:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
    }

    .qr-container img {
        /* 這裡使用 API 即時產生你的 GitHub Page QR Code */
        width: 100px;
        height: 100px;
        border-radius: 8px;
        margin-bottom: 8px;
        border: 1px solid #f0f0f0;
    }

    .qr-text {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.5px;
    }

    /* ===== 氣泡按鈕 ===== */
    .bubble {
        position: absolute;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-main);
        cursor: pointer;
        opacity: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        border: 1px solid rgba(255,255,255,0.6);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* 微調氣泡位置，避免被 QR Code 擋到右下角 */
    .b1 { background: rgba(255, 224, 196, 0.85); top: 18%; left: 15%; animation: floatIn 1s forwards 0.7s, floatMove 5s infinite ease-in-out 0.7s; }
    .b2 { background: rgba(255, 214, 224, 0.85); top: 25%; right: 15%; animation: floatIn 1s forwards 0.8s, floatMove 6s infinite ease-in-out 0.8s; }
    .b3 { background: rgba(224, 247, 250, 0.85); bottom: 25%; left: 12%; animation: floatIn 1s forwards 0.9s, floatMove 4.5s infinite ease-in-out 0.9s; }
    .b4 { background: rgba(232, 245, 233, 0.85); top: 50%; right: 12%; animation: floatIn 1s forwards 1.0s, floatMove 5.5s infinite ease-in-out 1.0s; }
    .b5 { background: rgba(255, 243, 224, 0.85); top: 50%; left: 8%; animation: floatIn 1s forwards 1.1s, floatMove 5s infinite ease-in-out 1.1s; }
    .b6 { background: rgba(243, 229, 245, 0.85); bottom: 18%; right: 35%; animation: floatIn 1s forwards 1.2s, floatMove 6.5s infinite ease-in-out 1.2s; }

    .bubble:hover {
        transform: scale(1.1) translateY(-5px) !important;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        z-index: 20;
        border-color: #fff;
    }

    /* ===== Keyframes 動畫 ===== */
    @keyframes popIn {
        0% { opacity: 0; transform: scale(0.8); }
        100% { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    @keyframes floatIn {
        0% { opacity: 0; transform: translateY(30px) scale(0.9); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes floatMove {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
    }

    /* ===== RWD ===== */
    @media (max-width: 768px) {
        .bubble { padding: 10px 16px; font-size: 13px; }
        .b1 { top: 15%; left: 5%; }
        .b2 { top: 20%; right: 5%; }
        .b3 { bottom: 20%; left: 5%; }
        .b4 { top: 45%; right: 5%; }
        .b5 { top: 40%; left: 2%; }
        .b6 { bottom: 15%; right: 35%; }
        .name { font-size: 30px; }
        .profile-pic { width: 140px; height: 140px; }
        .social-btn { width: 40px; height: 40px; }
        /* 手機版隱藏 QR Code，因為面試官可以直接滑手機 */
        .qr-container { display: none; }
    }
</style>
