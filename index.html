<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Home</title>

<style>
:root{
    --primary:#FFE0C4;
    --primary-dark:#f5cba7;
    --text:#2b2b2b;
}
body{
    margin:0;
    font-family:"Segoe UI", sans-serif;
    background:#fff;
    color:var(--text);
}
nav{
    position:sticky;
    top:0;
    background:var(--primary);
    display:flex;
    justify-content:center;
    gap:18px;
    padding:14px;
}
nav a{
    text-decoration:none;
    color:#333;
    padding:8px 12px;
    border-radius:8px;
    transition:.3s;
}
nav a:hover{
    background:var(--primary-dark);
    transform:translateY(-2px);
}
.hero{
    height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(120deg,var(--primary),#fff);
    text-align:center;
}

/* 👇 頭像外框 */
.profile-wrapper{
    padding:8px;
    border-radius:50%;
    background:linear-gradient(120deg,#fff,var(--primary));
    margin-bottom:20px;
    position:relative;
}

/* 👇 頭像 */
.profile-pic{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    display:block;
}

/* 👇 選取框動畫 */
.profile-wrapper::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border-radius:50%;
    border:2px dashed #999;
    opacity:0;
    transform:scale(1.2);
    transition:0.3s;
}

/* 👇 hover 效果 */
.profile-wrapper:hover::after{
    opacity:1;
    transform:scale(1);
}
.profile-wrapper:hover{
    cursor:crosshair;
}

.btn{
    padding:12px 20px;
    background:var(--primary);
    border:none;
    border-radius:10px;
    cursor:pointer;
}
.btn:hover{
    background:var(--primary-dark);
}
</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="education.html">Education</a>
<a href="courses.html">Courses</a>
<a href="projects.html">Projects</a>
<a href="research.html">Research</a>
<a href="internship.html">Internship</a>
<a href="others.html">Others</a>
</nav>

<div class="hero">

<!-- 👇 個人照片 -->
<div class="profile-wrapper">
    <img src="images/profile.png" class="profile-pic">
</div>

<h1>張綵芸</h1>
<p>AI / Medical Image / Deep Learning</p>

<button class="btn" onclick="location.href='about.html'">
    Enter Portfolio
</button>

</div>

</body>
</html>
