<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Home</title>

<style>
:root{
    --primary:#FFE0C4;
    --primary-dark:#f5cba7;
    --text:#2b2b2b;
}

/* ===== 基本 ===== */
body{
    margin:0;
    font-family:"Segoe UI", sans-serif;
    background:#fff;
    color:var(--text);
    overflow:hidden;
}

nav{
    position:fixed;
    top:0;
    width:100%;
    background:var(--primary);
    display:flex;
    justify-content:center;
    gap:18px;
    padding:14px;
    z-index:10;
}
nav a{
    text-decoration:none;
    color:#333;
    padding:8px 12px;
    border-radius:8px;
    transition:.3s;
}
nav a:hover{
    background:var(--primary-dark);
}

/* ===== Hero ===== */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(120deg,var(--primary),#fff);
    text-align:center;
    position:relative;
}

/* ===== 頭像 ===== */
.profile-wrapper{
    padding:8px;
    border-radius:50%;
    background:linear-gradient(120deg,#fff,var(--primary));
    position:relative;

    /* 入場動畫 */
    opacity:0;
    transform:scale(0.5);
    animation:fadeInScale 1s ease forwards;
}

.profile-pic{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
}

/* 虛線顏色改柔和 */
.profile-wrapper::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border-radius:50%;
    border:2px dashed #e6bfa6;
    opacity:0;
    transform:scale(1.2);
    transition:.3s;
}
.profile-wrapper:hover::after{
    opacity:1;
    transform:scale(1);
}

/* ===== 氣泡 ===== */
.bubble{
    position:absolute;
    padding:10px 16px;
    border-radius:30px;
    font-size:14px;
    color:#333;
    cursor:pointer;
    opacity:0;
    transform:translateY(30px);
    animation:floatIn 1s ease forwards;
}

/* 不同顏色（柔和） */
.b1{ background:#FFE0C4; top:20%; left:20%; animation-delay:0.3s;}
.b2{ background:#FFD6E0; top:30%; right:18%; animation-delay:0.5s;}
.b3{ background:#E0F7FA; bottom:30%; left:15%; animation-delay:0.7s;}
.b4{ background:#E8F5E9; bottom:20%; right:20%; animation-delay:0.9s;}
.b5{ background:#FFF3E0; top:50%; left:8%; animation-delay:1.1s;}
.b6{ background:#F3E5F5; top:55%; right:10%; animation-delay:1.3s;}

/* hover 變色 */
.bubble:hover{
    background:var(--primary-dark);
    transform:scale(1.1);
}

/* ===== 動畫 ===== */
@keyframes fadeInScale{
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes floatIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* 微浮動效果 */
.bubble{
    animation-name:floatIn, floatMove;
    animation-duration:1s, 4s;
    animation-fill-mode:forwards;
    animation-iteration-count:1, infinite;
}
@keyframes floatMove{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

.btn{
    margin-top:20px;
    padding:12px 20px;
    background:var(--primary);
    border:none;
    border-radius:10px;
    cursor:pointer;
}
.btn:hover{
    background:var(--primary-dark);
}
</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="education.html">Education</a>
<a href="courses.html">Courses</a>
<a href="projects.html">Projects</a>
<a href="research.html">Research</a>
<a href="internship.html">Internship</a>
<a href="others.html">Others</a>
</nav>

<div class="hero">

<!-- 頭像 -->
<div class="profile-wrapper">
    <img src="images/profile.png" class="profile-pic">
</div>

<h1>張綵芸</h1>
<p>國立陽明交通大學</p>
<p>資訊管理學系</p>

<!-- 氣泡 -->
<div class="bubble b1" onclick="location.href='education.html'">Education</div>
<div class="bubble b2" onclick="location.href='courses.html'">Courses</div>
<div class="bubble b3" onclick="location.href='projects.html'">Projects</div>
<div class="bubble b4" onclick="location.href='research.html'">Research</div>
<div class="bubble b5" onclick="location.href='internship.html'">Internship</div>
<div class="bubble b6" onclick="location.href='others.html'">Others</div>

</div>

</body>
</html>
